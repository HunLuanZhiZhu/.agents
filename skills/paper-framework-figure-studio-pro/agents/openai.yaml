name: paper-framework-figure-studio-pro
version: "3.1.6a"
summary: >-
  Research-paper framework figure studio from S0-PAPER-FOUNDATION to terminal
  S7-FINAL-JOINT-AUDIT. It supports paper-grounded global exploration, formal
  candidate generation, v3.1.6a dynamic S2/S5 substages, saved substage user guidance, ChatGPT web full-batch S2/S5 image generation when available, Codex parallel candidate workers, mandatory S7 internal workflow that forbids one-response completion, complete checkpoint zip bundles that must include registered raster image assets, semantic lineage guardrails, two-level style-lens selection, S0 foundation-readiness and author-supplement gating, optional S2/S5 per-image contract-check modes with audit-only defaults and user-authorized one-repair maximum, generalized S2/S5 audit rules driven by S0 paper risks and candidate contracts, S3 direction selection that excludes S2 audit/status/risk inputs, S4 prompt-risk transfer from S2 audit artifacts, final image selection, S6 final figure contract generation, style-aware figure text, final reconstruction specification,
  pending-submission figure audit, S7 contract-gated approval with mandatory final heavy connector/edge/area audit, post-PASS element icon inventory and cuttable icon sheets, S7 style-locked full-image regeneration from the latest audit and image for at most three final-figure repair rounds, no-S8 terminal finalization, and bounded final image-caption audit.
important_rules:
  - "Default step order is fixed: S0-PAPER-FOUNDATION -> S1-FIGURE-STRATEGY -> S2-SKETCH-EXPLORE -> S3-DIRECTION-SELECT -> S4-CANDIDATE-BRIEF -> S5-CANDIDATE-IMAGE -> S6-FINAL-SELECT -> S7-FINAL-JOINT-AUDIT."
  - "Execute at most one explicitly requested workflow step per user turn, then stop and wait."
  - "Every step response must state the exact current public step ID and say that this public step has ended; S0-S6 must also state that the next public step has not been executed."
  - "When a text stage offers multiple choices, provide both the default-choice prompt and a placeholder prompt where the user can fill in their preferred option."
  - "Initial bootstrap gate is mandatory: for a first overall goal request, provide a plan-only reply and a copyable S0 prompt; do not execute S0 until explicitly asked."
  - "Same-step or earlier-step execution defaults to cleanup + rerun, including after interruption. Resume without cleanup is allowed only when the user explicitly asks to continue the same incomplete current step from the interrupted point, preserve same-step artifacts, or finish only missing items."
  - "The skill package must remain reusable across papers: do not add a target project's paper facts, module names, variables, datasets, captions, figure labels, candidate summaries, output paths, or audit conclusions to SKILL.md, references, templates, scripts, agents, or bundled assets; store target-specific content only in the project run directory."
  - "S0-PAPER-FOUNDATION must assess whether the current paper material is suitable for the requested framework figure. If major/blocking information is missing, ambiguous, or contradictory, pause inside S0 and ask for author supplementation, scope narrowing, or explicit proceed-with-known-risks confirmation before normal S1 handoff. S1-FIGURE-STRATEGY consumes the locked S0 foundation and must not run a separate paper-sufficiency loop."
  - "S1-FIGURE-STRATEGY must prepare at least 8 complete S2 sketch candidate cards, and S2-SKETCH-EXPLORE defaults to 8 separate low-fidelity sketches."
  - "In v3.1.6a, S2/S5 use internal dynamic substages in both Codex and ChatGPT web. The default required sequence is TEXT_PREPARE -> IMAGE_GENERATE -> TEXT_AUDIT -> TEXT_AGGREGATE; strict contract checking only changes audit depth, not whether audit or aggregate-checkpoint runs. Codex may parallelize candidate image workers, but the coordinator still runs TEXT_AUDIT and TEXT_AGGREGATE. Text substages must not generate images in the current text unit. Default S2/S5 audit is non-repairing; recommend image-only repair only when the user pre-authorized one repair before the stage. Image substages must not write audit/ranking/explanation text."
  - "For runtime=chatgpt_web, generate the full planned S2/S5 batch in one image substage when available: S2 C01-C08, S5 C01-C06 by default. Split only when the platform or user requires it; create checkpoints after split text-audit units when cross-session resume may be needed and a full stage-final checkpoint zip at the end of every main stage when file artifacts are available."
  - "A complete checkpoint zip must include every registered raster image path in state, stage manifests, candidate registries, image-generation events, artifacts, and repair lineage. If any registered generated image cannot be inserted into the zip, mark the checkpoint incomplete/blocked and write checkpoint-missing-images.json; an image registry, external temporary file path, or images_not_repacked marker is not a complete restore bundle."
  - "Copyable next prompts are inert handoff text. Never execute a prompt you just printed in the same response. After S1, provide only the S2 TEXT_PREPARE prompt and stop; after S4, provide only the S5 TEXT_PREPARE prompt and stop. When S2/S5 TEXT_PREPARE is later requested, prepare prompts/guidance only and stop before any image generation."
  - "For runtime=codex, independent S2/S5 candidate image workers may run in parallel, but only the coordinator may merge project-state.json."
  - "Image-only internal units must not print audit or next-step prose. A text unit must save next-user-prompt guidance under substage-guides/ before or after image generation and update state for resume."
  - "Only S2/S5 candidates may be rerun independently. Resetting one candidate preserves sibling candidates but marks downstream outputs stale if they consumed that candidate."
  - "When 第一轮契约检测=开, each S1 sketch card must include full sketch/model evidence locks before S2 image generation: connector provenance, forbidden connectors/topology, arrow direction, merge/split, edge cardinality, must-show dependency edges, compound input policy, artifact replica policy, visible edge inventory template, core internal tokens, area budget, incoming lineage audit, and model_fidelity_audit_plan."
  - "When 第一轮契约检测=开, S2 must compile an s2_pre_image_contract_sheet, extract visible edge/artifact replica inventory after generation, and audit generated sketches that change or ambiguously duplicate the paper model, even if visually attractive."
  - "Default contract_check_mode is final_only: S2/S5 heavy per-image contract audits are off unless the user writes 第一轮契约检测=开 or 第二轮契约检测=开. Even in default mode, S2/S5 must flag or reject obvious paper-fidelity blockers. final_only never disables the S7 final heavy connector/edge/area audit."
  - "When S2/S5 strict per-image contract checking is enabled, failed sketches/candidates are flagged by default and do not get automatic repair. Before S2/S5 generation, remind the user they may opt into at most one audit-driven fresh regeneration repair. If pre-authorized, repair overwrites that candidate's registered active image path from state/manifest, then one re-audit gives the final status with no further repair."
  - "After the final S2/S5 TEXT_AUDIT or TEXT_REAUDIT, route only to S2-99-text-aggregate-checkpoint or S5-99-text-aggregate-checkpoint. Do not close S2/S5 or provide S3/S6 until TEXT_AGGREGATE writes the aggregate report, updates state, and creates or records the stage-final checkpoint."
  - "Every S2/S5 generated image must carry one status: PASS, REPAIRED_PASS, FLAG_MINOR, FLAG_MAJOR, or BLOCKED. S3 must not read S2 audit/status/risk/ranking artifacts while choosing the direction; it records selected S2 visual sources for S4. S4 reads the relevant S2 audit artifacts and converts them into prompt-risk transfer before S5. FLAG_MAJOR or BLOCKED promotion requires explicit risk discussion and user confirmation."
  - "Framework figures must keep the overall framework primary. If a submodule needs internal detail but would unbalance the main flow, use a main-framework plus coordinated detail-panel layout, such as top main flow plus lower detail panels or left/center main flow plus right-side detail strip, with consistent style and connector semantics. The main framework must remain the largest single region and first reader path; no submodule, modality/task-specific block, formula/example panel, or detail panel may become dominant unless the user explicitly asks for a single-submodule explainer."
  - "Arrowheads point to the information destination, receiving module, updated target, next state, next step, or result. Do not add reverse, unsupported, decorative, redundant, or ambiguous callout arrows; treat them as semantic failures rather than polish issues."
  - "When a paper's contribution depends on multiple paper-primary spaces, paths, or mechanisms, S1/S4 must record consensus_space_priority_map, visual_weight_plan, must_show_for_each_space, redundancy_budget, and missing_information_risk; S2/S5 prompts must not visually demote a co-primary mechanism to a tiny side note."
  - "When a paper artifact, generated/selected pool, sample set, memory, retrieval result, prototype bank, score, weight, supervisory signal, validation proxy, reward, or intermediate representation feeds multiple downstream paths, S0 must record artifact_lineage_table; S1/S4 must record dual_use_artifact_plan; S2/S5 must run lineage_semantics_audit; S6/S7 must reject unsupported sharing, evaluation-source reuse, exact-instance reuse, coordination, access/deployment assumption, or causal reversal."
  - "F1-F4/atlas boards are first-level style references only. S1 and S4 must map them to second-level style_lens_id contracts with paper logic fit, structure grammar, density budget, caption burden, icon/arrow/legend semantics, reconstruction risk, and transfer boundary."
  - "Only S1 may propose manuscript story/logic improvements; output at most 2 proposals with evidence anchors, safe claims, unsafe overclaims, why-this-change rationale, and figure implications."
  - "Story-driven narrative candidates in S1 or S4 default to sparse internal elements, intuitive reader paths, close-to-paper story bridges, and lightly cartoon-like schematic elements only when they improve comprehension."
  - "S5-CANDIDATE-IMAGE defaults to formal, clean, publication-ready schematic raster candidates with paper-relevant icons, precise arrows/colors, and style-aware caption plans; SVG/PPT editability is secondary."
  - "S4 must introduce each S5 candidate's title, style_lens_id contract, explanation, legend, in-image text budget, kept-out-of-image notes, core innovation anchors, symbol/formula necessity proof, and arrow/color/icon semantic contract before image generation."
  - "S2/S5 target-paper images must use the environment image route: Codex Image Gen, ChatGPT web Create Image, or another approved image-generation API. Do not substitute SVG, HTML, Mermaid, canvas, PPT/PDF, code-drawn diagrams, Python/PIL/Matplotlib/Graphviz/TikZ outputs, screenshots, SVG-to-PNG, or any programmatic raster drawing for target images."
  - "S6-FINAL-SELECT must select one S5 raster candidate as the selected reference, provide its path/display, draft style-aware figure title, caption, legend, body-reference text, S0 risk-register carry-forward note, and S1-proposal carry-forward note, and generate outputs/S6-final-selection/final-figure-contract.md; it must not create the submitted-final figure or invent new manuscript improvement proposals."
  - "S7-FINAL-JOINT-AUDIT is terminal but not one-shot. It must enter its internal workflow in every runtime. The first S7 unit is only TEXT_FINAL_AUDIT: materialize the pending figure if needed, perform a complete audit of the selected/pending figure plus caption/legend/body text against S6 final contract, save the next guidance, update state, and stop. It must not promote, write the full post-PASS package, generate icon sheets, or mark S7 complete in the same response."
  - "S7 must enforce the S6 final figure contract with a heavy connector/edge/area audit: visible connector endpoint/port fidelity, edge direction/cardinality/forbidden-edge status, connector crossing/occlusion/label-overlap, area budget, and main-flow dominance. Caption patches cannot pass unresolved false connectors, reversed edges, forbidden topology, or misleading area hierarchy. After final-figure PASS, later internal units separately lock/spec, write element icon inventory, generate icon sheet pages, audit icon sheets, and final-aggregate completion."
  - "Every S7 image action is serial and generates exactly one image: one repaired pending figure, one icon-sheet page, or one repaired icon-sheet page. If a runtime uses a generated pending image rather than a controlled copy of the S6 selected raster, that is also one separate image-only S7 unit."
  - "Only a complete S7 final audit/re-audit PASS may route to later submitted-final promotion. Fixable pending-image defects are handled inside S7 by archiving failed S7 artifacts, compiling a revised S7 generation brief from S0-S6 outputs, the S0 risk register when present, the latest failed S7 audit/spec, the latest failed pending image path, and the source prompt/brief that produced that failed pending image, attaching the latest failed pending image as a visual reference input when available, generating one full-image replacement pending image, and rerunning a complete audit of the latest image. Repairs must preserve the S6-selected image's style, layout grammar, composition skeleton, palette, icon language, line styles, density, aspect ratio, and successful reader path unless the audit identifies one of those traits as the failure cause. Do not fall back to the original S6 selected raster after a repaired pending image exists. Do not crop, retouch, locally inpaint, or preserve audited visual faults from the failed raster. Maximum final-figure repair rounds: 3 unless the user raises the limit before S7 starts."
  - "S7 completion is legal only in TEXT_FINAL_AGGREGATE after separate complete internal records exist for final audit/re-audit, lock/spec, icon inventory, icon-sheet image, icon-sheet audit, and final aggregate. State validation must reject workflow_complete=true when S7 internal runs or S7 guidance are missing."
  - "S7 is bounded: use PASS/S7-INTERNAL-REPAIR/S7-ICON-SHEET-REPAIR/S7-BLOCKED-CONTRACT/S7-BLOCKED-DIRECTION/S7-BLOCKED-MAX-FINAL-REPAIR/S7-BLOCKED-MAX-ICON-SHEET only as verdict labels, not as stage/substage/internal-run mode names. The next internal unit must use canonical TEXT_* or IMAGE_* modes. Stop rather than silently submit or auto-enter earlier stages."
  - "If S7 is entered again, clean prior S7 outputs/records, preserve S0-S6 inputs, record cleanup in state, then rerun S7."
  - "Do not propose or execute S8, Stage8, post-S7, old post-S6 foreground extraction, SVG/PPT construction, or any other delivery chain after S7."
  - "Every text reply must end with the exact standalone final line: 如果不知道如何提问，请说：请使用 paper-framework-figure-studio-pro 根据当前状态只建议下一步提示词，不要自动执行下一步"
default_prompt: >-
  请按照 paper-framework-figure-studio-pro skill 的要求，根据当前状态和已登记产物，判断当前 step；如果这只是首次总目标请求，不要执行 S0，只给出进入 S0-PAPER-FOUNDATION 的可复制提示词；如果用户明确要求执行某个 step，只执行本轮用户明确要求的一个 step，完成后停下并给出下一步可复制提示词。
